# Development OTel Collector config for testing dtlm's future
# OTLPHTTPJSONExporter.
#
# Accepts OTLP over HTTP (:4318) and gRPC (:4317). Every received
# record is dumped to stdout via the `debug` exporter with full
# attribute detail, so you can see exactly what dtlm sent.
#
# Three pipelines (logs, metrics, traces) so dtlm can exercise every
# OTel signal it plans to emit.
#
# Run manually:
#   /usr/local/bin/otelcol-contrib --config /home/koryheard/Projects/ObservableBSD/otelcol-dev.yaml
#
# Verify liveness:
#   curl -s http://localhost:13133 && echo        # health check
#   curl -v http://localhost:4318/v1/logs \
#        -H 'Content-Type: application/json' \
#        -d '{"resourceLogs":[]}'                 # should 200 OK

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    # Short timeout so dtlm events appear in the debug output
    # with minimal buffering during interactive testing.
    timeout: 200ms
    send_batch_size: 64

exporters:
  debug:
    verbosity: detailed

extensions:
  health_check:
    endpoint: 0.0.0.0:13133

service:
  extensions: [health_check]
  pipelines:
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]
